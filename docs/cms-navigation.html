<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Prototype Navigation CMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lucide-static@0.321.0/font/lucide.css"
    />
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f8fafb;
        --surface-alt: #ffffff;
        --surface-elevated: rgba(11, 13, 15, 0.08);
        --border: #e6e8ec;
        --border-strong: #cfd3d9;
        --text-primary: #0b0d0f;
        --text-secondary: rgba(11, 13, 15, 0.65);
        --text-muted: rgba(11, 13, 15, 0.45);
        --accent: #6a5ae0;
        --accent-positive: #32b687;
        --radius-card: 12px;
        --radius-input: 8px;
        --radius-badge: 6px;
        --shadow-elevated: 0 8px 24px rgba(11, 13, 15, 0.12);
        --transition: 140ms ease;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, sans-serif;
        line-height: 1.5;
      }
      .app-shell {
        display: grid;
        grid-template-columns: 300px 1fr;
        min-height: 100vh;
      }
      .topbar {
        position: sticky;
        top: 0;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        height: 64px;
        padding: 0 24px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        gap: 24px;
        z-index: 10;
      }
      .return {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--text-secondary);
        font-size: 16px;
        text-decoration: none;
        min-height: 44px;
      }
      .toggle-group {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: var(--radius-input);
        overflow: hidden;
      }
      .toggle-group button {
        min-width: 88px;
        padding: 10px 16px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background var(--transition), color var(--transition);
      }
      .toggle-group button.is-active {
        background: rgba(11, 13, 15, 0.08);
        color: var(--text-primary);
      }
      .toggle-group button:focus-visible,
      .btn:focus-visible,
      .chip:focus-visible,
      .block-item:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }
      .actions {
        display: inline-flex;
        gap: 12px;
        align-items: center;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 44px;
        padding: 0 20px;
        font-size: 14px;
        font-weight: 600;
        border-radius: var(--radius-input);
        border: 1px solid transparent;
        background: transparent;
        color: var(--text-primary);
        cursor: pointer;
        transition: transform var(--transition), filter var(--transition),
          background var(--transition), color var(--transition);
      }
      .btn:hover {
        filter: brightness(1.04);
      }
      .btn:active {
        filter: brightness(0.96);
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-success {
        background: rgba(50, 182, 135, 0.12);
        color: var(--accent-positive);
        border-color: rgba(50, 182, 135, 0.32);
      }
      .btn-ghost {
        border-color: var(--border);
        color: var(--text-secondary);
      }
      .btn-accent {
        background: rgba(106, 90, 224, 0.12);
        color: var(--accent);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 12px;
        border-radius: var(--radius-badge);
        background: rgba(106, 90, 224, 0.16);
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
      }
      .sidebar {
        background: var(--surface);
        border-right: 1px solid var(--border);
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .tabs {
        display: inline-flex;
        gap: 8px;
      }
      .tabs button {
        padding: 10px 16px;
        border-radius: var(--radius-input);
        border: none;
        background: transparent;
        font-size: 14px;
        color: var(--text-secondary);
        cursor: pointer;
      }
      .tabs button.is-active {
        background: rgba(106, 90, 224, 0.12);
        color: var(--accent);
      }
      .search {
        position: relative;
      }
      .search input {
        width: 100%;
        height: 44px;
        padding: 0 44px;
        border-radius: var(--radius-input);
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text-primary);
      }
      .search .icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
      }
      .search button {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: none;
        color: var(--text-muted);
        cursor: pointer;
      }
      .group-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-secondary);
      }
      .block-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .block-item {
        display: grid;
        grid-template-columns: 24px 1fr auto 24px;
        align-items: center;
        padding: 12px;
        border-radius: var(--radius-input);
        border: 1px solid transparent;
        background: transparent;
        cursor: grab;
        transition: background var(--transition), border var(--transition),
          color var(--transition);
      }
      .block-item:hover {
        background: rgba(106, 90, 224, 0.08);
      }
      .block-item.is-active {
        background: rgba(106, 90, 224, 0.12);
        border-color: var(--accent);
        color: var(--accent);
      }
      .block-item.is-disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .badge-populaire {
        padding: 2px 8px;
        border-radius: var(--radius-badge);
        background: rgba(106, 90, 224, 0.16);
        color: var(--accent);
        font-size: 11px;
        font-weight: 600;
      }
      .chips {
        display: flex;
        gap: 8px;
        padding: 24px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 36px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--bg);
        color: var(--text-secondary);
        cursor: pointer;
        transition: background var(--transition), color var(--transition);
      }
      .chip:hover {
        background: rgba(106, 90, 224, 0.08);
        color: var(--text-primary);
      }
      .canvas {
        padding: 0 32px 64px;
      }
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        border-radius: var(--radius-card);
        background: var(--surface);
        box-shadow: var(--shadow-elevated);
      }
    </style>
  </head>
  <body>
    <header class="topbar" role="banner">
      <a href="#" class="return" aria-label="Retour">
        <i class="lucide lucide-chevron-left" aria-hidden="true"></i>
        <span>Éditeur CMS › Profil</span>
      </a>
      <div>
        <div class="toggle-group" role="radiogroup" aria-label="Mode d’édition">
          <button type="button" class="is-active" aria-pressed="true">Éditer</button>
          <button type="button" aria-pressed="false">Aperçu</button>
        </div>
        <div
          class="toggle-group"
          role="radiogroup"
          aria-label="Type d’appareil"
          style="margin-left: 16px"
        >
          <button type="button" class="is-active" aria-pressed="true">
            <i class="lucide lucide-monitor" aria-hidden="true"></i> Desktop
          </button>
          <button type="button" aria-pressed="false">
            <i class="lucide lucide-smartphone" aria-hidden="true"></i> Mobile
          </button>
        </div>
      </div>
      <div class="actions">
        <span class="badge">Vérifications 1</span>
        <button class="btn btn-primary">Enregistrer</button>
        <button class="btn btn-success">Publier</button>
        <button class="btn btn-ghost">Prévisualiser</button>
        <button class="btn btn-accent">Nouvelle œuvre</button>
      </div>
    </header>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navigation CMS">
        <div class="sidebar-header">
          <div>
            <h2 style="margin: 0; font-size: 18px">Espace créatif</h2>
            <p style="margin: 4px 0 0; color: var(--text-secondary); font-size: 14px">
              Structure & blocs
            </p>
          </div>
          <span class="badge">0% complet</span>
        </div>
        <nav class="tabs" role="tablist" aria-label="Modes d’édition">
          <button role="tab" class="is-active" aria-selected="true">Blocs</button>
          <button role="tab" aria-selected="false">Sections</button>
          <button role="tab" aria-selected="false">Guides</button>
        </nav>
        <div class="search">
          <span class="icon lucide lucide-search" aria-hidden="true"></span>
          <input type="search" placeholder="Rechercher un bloc…" />
          <button type="button" aria-label="Effacer la recherche">×</button>
        </div>
        <section aria-labelledby="group-content">
          <div class="group-title" id="group-content">
            <i class="lucide lucide-folder-open" aria-hidden="true"></i> Contenu
          </div>
          <div class="block-list" role="listbox">
            <button class="block-item">
              <i class="lucide lucide-type" aria-hidden="true"></i>
              <span>Text</span>
              <span class="badge-populaire">Populaire</span>
              <i class="lucide lucide-grip-vertical" aria-hidden="true"></i>
            </button>
            <button class="block-item">
              <i class="lucide lucide-image" aria-hidden="true"></i>
              <span>Image</span>
              <span></span>
              <i class="lucide lucide-grip-vertical" aria-hidden="true"></i>
            </button>
            <button class="block-item is-active" aria-pressed="true">
              <i class="lucide lucide-images" aria-hidden="true"></i>
              <span>Gallery</span>
              <span class="badge-populaire">Populaire</span>
              <i class="lucide lucide-grip-vertical" aria-hidden="true"></i>
            </button>
            <button class="block-item">
              <i class="lucide lucide-video" aria-hidden="true"></i>
              <span>Vidéo</span>
              <span></span>
              <i class="lucide lucide-grip-vertical" aria-hidden="true"></i>
            </button>
            <button class="block-item">
              <i class="lucide lucide-code" aria-hidden="true"></i>
              <span>Embed</span>
              <span></span>
              <i class="lucide lucide-grip-vertical" aria-hidden="true"></i>
            </button>
            <button class="block-item is-disabled" disabled>
              <i class="lucide lucide-quote" aria-hidden="true"></i>
              <span>Quote</span>
              <span></span>
              <i class="lucide lucide-lock" aria-hidden="true"></i>
            </button>
          </div>
        </section>
      </aside>
      <main>
        <div class="chips">
          <button class="chip">Nom d’artiste</button>
          <button class="chip">Photo</button>
          <button class="chip">Biographie</button>
          <button class="chip">Œuvres</button>
        </div>
        <section class="canvas">
          <article
            style="
              border: 1px dashed var(--border);
              padding: 32px;
              border-radius: var(--radius-card);
            "
          >
            <h1 style="margin-top: 0">Canvas de l’éditeur</h1>
            <p>Zone libre pour l’aperçu de la page profil artiste.</p>
          </article>
        </section>
      </main>
    </div>
    <div class="toast" role="status" aria-live="polite">
      <i class="lucide lucide-check-circle-2" aria-hidden="true"></i>
      <div>
        <strong>Enregistrement réussi</strong>
        <div style="color: var(--text-secondary); font-size: 14px">
          Vos modifications ont été sauvegardées.
        </div>
      </div>
      <button class="btn btn-ghost" style="padding: 0 12px">Fermer</button>
    </div>
  </body>
</html>

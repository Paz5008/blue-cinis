name: CI
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Cache Prisma engines
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.prisma
            node_modules/@prisma/client
          key: ${{ runner.os }}-prisma-${{ hashFiles('prisma/schema.prisma') }}
      - run: npx prisma generate
      - name: Build (mock Prisma)
        run: npm run build:mock
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:critical
      - run: npm run test:coverage
        env:
          NODE_ENV: test

  integration:
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: loire
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres -d loire
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Prisma engines
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.prisma
            node_modules/@prisma/client
          key: ${{ runner.os }}-prisma-${{ hashFiles('prisma/schema.prisma') }}
      - run: npx prisma generate
      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Wait for DB
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 1
          done
          echo "DB is ready"
      - name: Migrate database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loire?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/loire?schema=public
      - name: Seed database
        run: npm run seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loire?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/loire?schema=public
      - name: DB Connectivity check
        run: node -e "const {PrismaClient}=require('@prisma/client'); const p=new PrismaClient(); p.$queryRawUnsafe('SELECT 1').then(()=>{console.log('OK')}).catch(e=>{console.error(e);process.exit(1)}).finally(()=>p.$disconnect())"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loire?schema=public
      - name: Run unit tests against real DB
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loire?schema=public
          NODE_ENV: test
